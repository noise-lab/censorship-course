# Shared Quarto config for all lecture decks.
# Each lecture lives in NN-Chapter/MM-Deck/slides.qmd and inherits these defaults.
# Only slides.qmd files are treated as project inputs, so legacy Marp .md files
# and raw _source-extract.md scratch are ignored by `quarto render`.
project:
  title: "Internet Censorship and Online Speech"
  render:
    - "**/slides.qmd"

format:
  revealjs:
    theme: [default, theme.scss]
    slide-number: c/t
    slide-level: 2
    incremental: false
    width: 1280
    height: 720
    history: false
    transition: fade
    footer: "Internet Censorship & Online Speech · University of Chicago"
    code-line-numbers: true
    highlight-style: github
    chalkboard: false
    link-external-newwindow: true

# Inline speaker notes use ::: {.notes} blocks; press 's' in the deck for
# presenter view.
